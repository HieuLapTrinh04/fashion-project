<div class="swiper mySwiper">
  <div class="swiper-wrapper">
    <div class="swiper-slide" *ngFor="let slide of slides">
      <img [src]="slide.image" alt="{{ slide.title }}" class="hero-image" />
      <div class="slide-caption d-none d-md-block" data-aos="fade-up" data-aos-duration="1000">
        <h2 class="display-3 fw-bold mb-3">{{ slide.title }}</h2>
        <p class="lead mb-0">{{ slide.description }}</p>
      </div>
    </div>
  </div>
  <div class="swiper-pagination"></div>
</div>

<style>
  .hero-image {
    width: 100%;
    height: 500px;
    object-fit: cover;
    filter: brightness(0.85);
  }
  .slide-caption {
    position: absolute;
    bottom: 20%;
    width: 100%;
    text-align: center;
    color: white;
    text-shadow: 0 4px 12px rgba(0,0,0,0.5);
    z-index: 10;
  }
</style>
