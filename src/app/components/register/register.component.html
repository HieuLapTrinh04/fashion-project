<app-header></app-header>

<main class="auth-wrapper d-flex align-items-center justify-content-center" style="min-height: 90vh; background-color: #f8fbff; padding: 60px 0;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-10">
        <div class="auth-card aura-card p-5 bg-white border-0 shadow-lg" style="border-radius: 20px;">
          <div class="text-center mb-5">
            <h2 class="display-6 fw-bold text-primary mb-2">Đăng Ký Tài Khoản</h2>
            <p class="text-muted">Tham gia cộng đồng Aura Fashion ngay hôm nay!</p>
          </div>

          <form #registerForm="ngForm" (ngSubmit)="register()" class="auth-form">
            <div class="row">
              <div class="col-md-6 mb-4">
                <label for="username" class="form-label fw-bold text-dark">Tên người dùng</label>
                <input
                  type="text"
                  id="username"
                  class="form-control bg-light border-0 py-3 rounded-3"
                  [(ngModel)]="registerData.username"
                  name="username"
                  placeholder="name123"
                  required
                />
              </div>
              <div class="col-md-6 mb-4">
                <label for="email" class="form-label fw-bold text-dark">Địa chỉ Email</label>
                <input
                  type="email"
                  id="email"
                  class="form-control bg-light border-0 py-3 rounded-3"
                  [(ngModel)]="registerData.email"
                  name="email"
                  placeholder="name@email.com"
                  required
                />
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label fw-bold text-dark">Mật khẩu</label>
              <input
                type="password"
                id="password"
                class="form-control bg-light border-0 py-3 rounded-3"
                [(ngModel)]="registerData.password"
                placeholder="Tối thiểu 8 ký tự"
                name="password"
                required
              />
            </div>

            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="terms" required>
              <label class="form-check-label text-muted small" for="terms">
                Tôi đồng ý với <a href="#" class="text-primary text-decoration-none">Điều khoản dịch vụ</a> và <a href="#" class="text-primary text-decoration-none">Chính sách bảo mật</a> của Aura.
              </label>
            </div>

            <button
              type="submit"
              class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm"
              [disabled]="registerForm.invalid"
            >
              Tạo Tài Khoản
            </button>
          </form>

          <div class="text-center mt-5">
            <p class="text-muted mb-0">
              Bạn đã có tài khoản? 
              <a routerLink="/login" class="text-primary text-decoration-none fw-bold">Đăng nhập tại đây</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<app-footer></app-footer>

<style>
  .form-control:focus {
    background-color: #fff !important;
    border-color: #007bff !important;
    box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.1);
  }
</style>
